apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  labels:
    app: fh-swf-mcp
    io.kubernetes.service: fh-swf-mcp-service
    io.kubernetes.part-of: fh-swf-mcp
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-filesystem