apiVersion: apps/v1
kind: Deployment
metadata:
  name: fh-swf-po-deployment
  labels:
    app: fh-swf-po
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fh-swf-po
  template:
    metadata:
      labels:
        app: fh-swf-po
    spec:
      automountServiceAccountToken: false
      containers:
      - name: fh-swf-po
        image: fh-swf-mcp:latest  # Gleiche Image wie MCP-Server (enthält PO-Module)
        ports:
          - containerPort: 8000
        volumeMounts:
          - mountPath: /app/data
            name: data-volume
          - mountPath: /etc/mcp/secrets
            name: mcp-secret-volume
            readOnly: true
        env:
          # MCP Authentication (JWKS JSON format)
          - name: MCP_KEY_FILE_PATH
            value: "/etc/mcp/secrets/key.json"

          # S3 Configuration für Prüfungsordnungs-PDFs
          - name: S3_ENDPOINT_URL
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: s3_endpoint_url
          - name: S3_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: s3_access_key
          - name: S3_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: s3_secret_key
          - name: S3_BUCKET
            value: "pruefungsordnungen"

          # Neo4j Configuration (shared mit MCP-Server)
          - name: NEO4J_URI
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: neo4j_uri
          - name: NEO4J_USERNAME
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: neo4j_username
          - name: NEO4J_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: neo4j_password

          # Logging
          - name: FASTMCP_LOG_LEVEL
            value: "INFO"

      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: data-pvc
      - name: mcp-secret-volume
        secret:
          secretName: mcp-server-keys
          defaultMode: 0400
          items:
            - key: mcp_jwks
              path: key.json
---
apiVersion: v1
kind: Service
metadata:
  name: fh-swf-po-service
  labels:
    app: fh-swf-po
spec:
  selector:
    app: fh-swf-po
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
