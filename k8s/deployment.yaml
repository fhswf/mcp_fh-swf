apiVersion: apps/v1
kind: Deployment
metadata:
  name: fh-swf-mcp-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fh-swf-mcp
  template:
    metadata:
      labels:
        app: fh-swf-mcp
    spec:
      automountServiceAccountToken: false
      containers:
      - name: fh-swf-mcp
        image: fh-swf-mcp:latest
        ports:
          - containerPort: 8000
        volumeMounts:
          - mountPath: /app/data
            name: data-volume
          - mountPath: /etc/mcp/secrets
            name: mcp-secret-volume
            readOnly: true
        env:
          # MCP Authentication (JWKS JSON format)
          - name: MCP_KEY_FILE_PATH
            value: "/etc/mcp/secrets/key.json"

          # Bibliothek Configuration
          - name: BIBLIOTHEK_API_KEY
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: bibliothek_api_key

          # Calendly Configuration
          - name: CALENDLY_API_KEY
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: calendly_api_key

          # Neo4j Configuration
          - name: NEO4J_URI
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: neo4j_uri
          - name: NEO4J_USERNAME
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: neo4j_username
          - name: NEO4J_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: neo4j_password
          -name: VPIS_LOG_LEVEL
            value: "DEBUG"
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: data-pvc
      - name: mcp-secret-volume
        secret:
          secretName: mcp-server-keys
          defaultMode: 0400
          items:
            - key: mcp_jwks
              path: key.json
---
apiVersion: v1
kind: Service
metadata:
  name: fh-swf-mcp-service
spec:
  selector:
    app: fh-swf-mcp
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP