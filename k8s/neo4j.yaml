apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:latest
        ports:
          - containerPort: 7474
          - containerPort: 7687
        volumeMounts:
          - mountPath: /data
            name: neo4j-data
        env:
          - name: NEO4J_AUTH
            valueFrom:
              secretKeyRef:
                name: neo4j-secrets
                key: neo4j_auth
      volumes:
      - name: neo4j-data
        persistentVolumeClaim:
          claimName: neo4j-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
spec:
  selector:
    app: neo4j
  ports:
    - name: neo4j-http
      protocol: TCP
      port: 7474
    - name: neo4j-bolt
      protocol: TCP
      port: 7687
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-pvc
  namespace: mcp-fh-swf
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: ceph-filesystem